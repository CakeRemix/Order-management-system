<!DOCTYPE html>
<html>
<head>
    <title>Test Data Attributes</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Testing jQuery Data Attributes</h1>
    
    <button class="test-btn" 
        data-name="Test Item"
        data-price="45.00"
        data-item-id="123"
        data-truck-id="456">
        Test Button
    </button>
    
    <div id="output"></div>
    
    <script>
        $(document).ready(function() {
            $('.test-btn').on('click', function() {
                const btn = $(this);
                
                // Test different ways to read data attributes
                const results = {
                    'Using .data("itemId")': btn.data('itemId'),
                    'Using .data("item-id")': btn.data('item-id'),
                    'Using .attr("data-item-id")': btn.attr('data-item-id'),
                    'Using .data("truckId")': btn.data('truckId'),
                    'Using .data("truck-id")': btn.data('truck-id'),
                    'Type of itemId': typeof btn.data('itemId'),
                    'Parsed itemId': parseInt(btn.data('itemId')),
                    'Parsed truckId': parseInt(btn.data('truckId'))
                };
                
                let output = '<pre>';
                for (let key in results) {
                    output += key + ': ' + JSON.stringify(results[key]) + '\n';
                }
                output += '</pre>';
                
                $('#output').html(output);
            });
            
            // Auto-click for testing
            $('.test-btn').click();
        });
    </script>
</body>
</html>
