<!DOCTYPE html>
<html>
<head>
    <title>Test Cart Flow</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { padding: 8px 16px; margin: 5px; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Testing Cart Flow with Data Attributes</h1>
    
    <div class="test-section">
        <h2>Simulated Menu Items</h2>
        <div id="menu-items"></div>
    </div>
    
    <div class="test-section">
        <h2>Cart State</h2>
        <pre id="cart-state"></pre>
    </div>
    
    <div class="test-section">
        <h2>Console Logs</h2>
        <pre id="console-logs"></pre>
    </div>
    
    <script>
        let logs = [];
        function log(msg) {
            logs.push(msg);
            $('#console-logs').text(logs.join('\n'));
            console.log(msg);
        }
        
        // Simulate the exact cart structure from main.js
        let cartStore = { owner: null, truckId: null, items: [] };
        
        function updateCartDisplay() {
            $('#cart-state').text(JSON.stringify(cartStore, null, 2));
        }
        
        function addToCart(item) {
            const qty = item.quantity || 1;
            const price = parseFloat(item.price) || 0;
            const truck = item.truck || null;
            const truckId = item.truckId || null;
            const itemId = item.itemId || null;
            
            log('addToCart called with: ' + JSON.stringify(item));
            
            // If cart has an owner and it's different from current truck, confirm
            if (cartStore.owner && truck && cartStore.owner !== truck) {
                const ok = confirm('You are ordering from a different truck. This will clear your current cart. Continue?');
                if (!ok) return false;
                cartStore.items = [];
                cartStore.truckId = null;
            }
            
            if (truck) {
                cartStore.owner = truck;
                log('Set cart owner: ' + truck);
            }
            if (truckId) {
                cartStore.truckId = truckId;
                log('Set cart truckId: ' + truckId);
            }
            
            const existing = cartStore.items.find(i => i.name === item.name);
            if (existing) {
                existing.quantity += qty;
                log('Updated quantity for existing item');
            } else {
                cartStore.items.push({ 
                    name: item.name, 
                    price: price, 
                    quantity: qty,
                    itemId: itemId
                });
                log('Added new item to cart');
            }
            
            log('Cart saved: ' + JSON.stringify(cartStore));
            updateCartDisplay();
            return true;
        }
        
        // Simulate the exact menu items structure from API
        const mockMenuItems = [
            { itemid: 1, truckid: 1, name: 'Chicken Shawarma Wrap', price: '45.00', is_available: true },
            { itemid: 2, truckid: 1, name: 'Beef Shawarma Plate', price: '75.00', is_available: true }
        ];
        
        $(document).ready(function() {
            const truckName = 'Demeshq';
            
            // Render items exactly like restaurant.html does
            const itemsHTML = mockMenuItems.map(function(item) {
                return `
                    <div style="border: 1px solid #ddd; padding: 10px; margin: 5px;">
                        <strong>${item.name}</strong> - L.E ${parseFloat(item.price).toFixed(2)}
                        <button class="add-btn" 
                            data-name="${item.name}" 
                            data-price="${item.price}"
                            data-item-id="${item.itemid}"
                            data-truck-id="${item.truckid}">
                            Add to Cart
                        </button>
                    </div>
                `;
            }).join('');
            
            $('#menu-items').html(itemsHTML);
            
            // Exact click handler from restaurant.html
            $(document).on('click', '.add-btn', function(e) {
                const btn = $(this);
                if (btn.prop('disabled')) return;
                
                const name = btn.data('name');
                const price = parseFloat(btn.data('price'));
                const itemId = parseInt(btn.data('itemId'));
                const truckId = parseInt(btn.data('truckId'));
                
                log('Button clicked - Read values: ' + JSON.stringify({ name, price, itemId, truckId }));
                
                const added = addToCart({ 
                    name, 
                    price, 
                    quantity: 1, 
                    truck: truckName,
                    itemId: itemId,
                    truckId: truckId
                });
                
                if (added) {
                    log('Item successfully added to cart');
                } else {
                    log('Failed to add item to cart');
                }
            });
            
            log('Page loaded. Click "Add to Cart" buttons to test.');
            updateCartDisplay();
        });
    </script>
</body>
</html>
