<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Join CampusEats Today</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card signup-card">
            <div class="form-header">
                <span class="material-icons form-icon">person_add</span>
            </div>
            <h1 class="auth-title">Create Your Account</h1>
            <p class="auth-subtitle">Join CampusEats and start ordering delicious food today!</p>
        
        <div id="alert" class="alert" style="display: none;"></div>
        
        <form id="signupForm">
            <div class="form-group">
                <label for="name" class="form-label">Full name</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    class="form-input" 
                    placeholder="Enter your full name"
                    required
                >
                <div class="error-message" id="nameError"></div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">GIU Email address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    placeholder="your.name@student.giu-uni.de"
                    required 
                    autocomplete="email"
                >
                <small class="form-hint">Must be a valid GIU email address</small>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="birthdate" class="form-label">Birth Date</label>
                <input 
                    type="date" 
                    id="birthdate" 
                    name="birthdate" 
                    class="form-input" 
                    required
                >
                <div class="error-message" id="birthdateError"></div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input"
                    placeholder="At least 8 characters"
                    required
                >
                <small class="form-hint">Must contain uppercase, lowercase, and numbers</small>
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirm password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    class="form-input"
                    placeholder="Re-enter your password"
                    required
                >
                <div class="error-message" id="confirmPasswordError"></div>
            </div>

            <button type="submit" class="button" id="submitButton">
                <span id="spinner" class="spinner" style="display: none;"></span>
                Sign up
            </button>
        </form>

        <p class="auth-footer-text">
            Already have an account? <a href="login.html" class="auth-link">Sign in</a>
        </p>
    </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check if user is already authenticated
            const isAuthenticated = await checkAuth();
            if (isAuthenticated) {
                window.location.href = '/dashboard.html';
                return;
            }

            const form = document.getElementById('signupForm');
            const submitButton = document.getElementById('submitButton');
            const spinner = document.getElementById('spinner');
            const alert = document.getElementById('alert');
            
            const showError = (message) => {
                alert.className = 'alert alert-error';
                alert.textContent = message;
                alert.style.display = 'block';
            };

            const showLoading = (loading) => {
                submitButton.disabled = loading;
                spinner.style.display = loading ? 'inline-block' : 'none';
                submitButton.textContent = loading ? 'Creating account...' : 'Sign up';
                if (loading) {
                    submitButton.prepend(spinner);
                }
            };

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const birthdate = document.getElementById('birthdate').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                // Reset errors
                document.getElementById('nameError').textContent = '';
                document.getElementById('emailError').textContent = '';
                document.getElementById('birthdateError').textContent = '';
                document.getElementById('passwordError').textContent = '';
                document.getElementById('confirmPasswordError').textContent = '';
                alert.style.display = 'none';

                // Validate name
                if (!name.trim()) {
                    document.getElementById('nameError').textContent = 'Name is required';
                    return;
                }

                // Validate email
                if (!validateEmail(email)) {
                    document.getElementById('emailError').textContent = 'Please enter a valid email address';
                    return;
                }

                // Validate birthdate
                if (!birthdate) {
                    document.getElementById('birthdateError').textContent = 'Birth date is required';
                    return;
                }

                // Validate age (must be at least 13 years old)
                const birthDate = new Date(birthdate);
                const today = new Date();
                const age = today.getFullYear() - birthDate.getFullYear();
                const monthDiff = today.getMonth() - birthDate.getMonth();
                
                if (age < 13 || (age === 13 && monthDiff < 0)) {
                    document.getElementById('birthdateError').textContent = 'You must be at least 13 years old';
                    return;
                }

                // Validate role
                if (!role || !['customer', 'truckOwner'].includes(role)) {
                    document.getElementById('roleError').textContent = 'Please select a valid account type';
                    return;
                }

                // Validate password
                if (!validatePassword(password)) {
                    document.getElementById('passwordError').textContent = 
                        'Password must be at least 8 characters long and contain uppercase, lowercase, and numbers';
                    return;
                }

                // Validate password confirmation
                if (password !== confirmPassword) {
                    document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
                    return;
                }

                // Show loading state
                showLoading(true);

                try {
                    const response = await signup(name, email, password, confirmPassword, birthdate);
                    if (response.success) {
                        // Show success message
                        alert.className = 'alert alert-success';
                        alert.textContent = 'Account created successfully! Redirecting to login...';
                        alert.style.display = 'block';
                        
                        // Redirect to login page after 2 seconds
                        setTimeout(() => {
                            window.location.href = '/login.html';
                        }, 2000);
                    }
                } catch (error) {
                    showError(error.message || 'An error occurred during sign up');
                } finally {
                    showLoading(false);
                }
            });
        });
    </script>
</body>
</html>
