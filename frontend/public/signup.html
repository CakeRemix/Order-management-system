<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Join CampusEats Today</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card signup-card">
            <div class="form-header">
                <span class="material-icons form-icon">person_add</span>
            </div>
            <h1 class="auth-title">Create Your Account</h1>
            <p class="auth-subtitle">Join CampusEats and start ordering delicious food today!</p>
        
        <div id="alert" class="alert" style="display: none;"></div>
        
        <form id="signupForm">
            <div class="form-group">
                <label for="name" class="form-label">Full name</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    class="form-input" 
                    required
                >
                <div class="error-message" id="nameError"></div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    required 
                    autocomplete="email"
                >
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input" 
                    required
                >
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirm password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    class="form-input" 
                    required
                >
                <div class="error-message" id="confirmPasswordError"></div>
            </div>

            <button type="submit" class="button" id="submitButton">
                <span id="spinner" class="spinner" style="display: none;"></span>
                Sign up
            </button>
        </form>

        <p class="auth-footer-text">
            Already have an account? <a href="login.html" class="auth-link">Sign in</a>
        </p>
    </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        $(document).ready(function() {
            // Check if user is already authenticated
            checkAuth().then(function(isAuthenticated) {
                if (isAuthenticated) {
                    const userInfo = getUserInfo();
                    if (userInfo.role === 'admin') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                    return;
                }
            });

            const form = $('#signupForm');
            const submitButton = $('#submitButton');
            const spinner = $('#spinner');
            const alert = $('#alert');
            
            const showError = (message) => {
                alert.removeClass().addClass('alert alert-error');
                alert.text(message);
                alert.show();
            };

            const showLoading = (loading) => {
                submitButton.prop('disabled', loading);
                spinner.css('display', loading ? 'inline-block' : 'none');
                submitButton.text(loading ? 'Creating account...' : 'Sign up');
                if (loading) {
                    submitButton.prepend(spinner);
                }
            };

            form.on('submit', function(e) {
                e.preventDefault();
                
                const name = $('#name').val();
                const email = $('#email').val();
                const password = $('#password').val();
                const confirmPassword = $('#confirmPassword').val();

                // Reset errors
                $('#nameError').text('');
                $('#emailError').text('');
                $('#passwordError').text('');
                $('#confirmPasswordError').text('');
                alert.hide();

                // Validate name
                if (!name.trim()) {
                    $('#nameError').text('Name is required');
                    return;
                }

                // Validate email
                if (!validateEmail(email)) {
                    $('#emailError').text('Please enter a valid email address');
                    return;
                }

                // Validate password
                if (!validatePassword(password)) {
                    $('#passwordError').text(
                        'Password must be at least 8 characters long and contain uppercase, lowercase, and numbers'
                    );
                    return;
                }

                // Validate password confirmation
                if (password !== confirmPassword) {
                    $('#confirmPasswordError').text('Passwords do not match');
                    return;
                }

                // Show loading state
                showLoading(true);

                signup(name, email, password, confirmPassword)
                    .done(function(response) {
                        if (response.success) {
                            // Show success message
                            alert.removeClass().addClass('alert alert-success');
                            alert.text('Account created successfully! Redirecting to login...');
                            alert.show();
                            
                            // Redirect to login page after 2 seconds
                            setTimeout(function() {
                                window.location.href = '/login.html';
                            }, 2000);
                        }
                    })
                    .fail(function(error) {
                        showError(error.message || 'An error occurred during sign up');
                    })
                    .always(function() {
                        showLoading(false);
                    });
            });
        });
    </script>
</body>
</html>
