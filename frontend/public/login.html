<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Order Management System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1 class="form-title">Sign in to your account</h1>
        
        <div id="alert" class="alert" style="display: none;"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">Email address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    required 
                    autocomplete="email"
                >
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input" 
                    required
                >
                <div class="error-message" id="passwordError"></div>
            </div>

            <button type="submit" class="button" id="submitButton">
                <span id="spinner" class="spinner" style="display: none;"></span>
                Sign in
            </button>
        </form>

        <a href="signup.html" class="link">Don't have an account? Sign up</a>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check if user is already authenticated
            const isAuthenticated = await checkAuth();
            if (isAuthenticated) {
                window.location.href = '/dashboard.html';
                return;
            }

            const form = document.getElementById('loginForm');
            const submitButton = document.getElementById('submitButton');
            const spinner = document.getElementById('spinner');
            const alert = document.getElementById('alert');
            
            const showError = (message) => {
                alert.className = 'alert alert-error';
                alert.textContent = message;
                alert.style.display = 'block';
            };

            const showLoading = (loading) => {
                submitButton.disabled = loading;
                spinner.style.display = loading ? 'inline-block' : 'none';
                submitButton.textContent = loading ? 'Signing in...' : 'Sign in';
                if (loading) {
                    submitButton.prepend(spinner);
                }
            };

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                // Reset errors
                document.getElementById('emailError').textContent = '';
                document.getElementById('passwordError').textContent = '';
                alert.style.display = 'none';

                // Validate email
                if (!validateEmail(email)) {
                    document.getElementById('emailError').textContent = 'Please enter a valid email address';
                    return;
                }

                // Show loading state
                showLoading(true);

                try {
                    const response = await login(email, password);
                    if (response.success) {
                        window.location.href = '/dashboard.html';
                    }
                } catch (error) {
                    showError(error.message || 'An error occurred during login');
                } finally {
                    showLoading(false);
                }
            });
        });
    </script>
</body>
</html>
