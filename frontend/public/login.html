<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Welcome Back to CampusEats</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card login-card">
            <div class="form-header">
                <span class="material-icons form-icon">lock_open</span>
            </div>
            <h1 class="auth-title">Welcome Back!</h1>
            <p class="auth-subtitle">Sign in to continue your CampusEats experience</p>
        
        <div id="alert" class="alert" style="display: none;"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">Email address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    required 
                    autocomplete="email"
                >
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input" 
                    required
                >
                <div class="error-message" id="passwordError"></div>
            </div>

            <button type="submit" class="button" id="submitButton">
                <span id="spinner" class="spinner" style="display: none;"></span>
                Sign in
            </button>
        </form>

        <p class="auth-footer-text">
            Don't have an account? <a href="signup.html" class="auth-link">Sign up</a>
        </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        $(document).ready(function() {
            // Check if user is already authenticated
            checkAuth().then(function(isAuthenticated) {
                if (isAuthenticated) {
                    window.location.href = '/dashboard.html';
                    return;
                }
            });

            const form = $('#loginForm');
            const submitButton = $('#submitButton');
            const spinner = $('#spinner');
            const alert = $('#alert');
            
            const showError = (message) => {
                alert.removeClass().addClass('alert alert-error');
                alert.text(message);
                alert.show();
            };

            const showLoading = (loading) => {
                submitButton.prop('disabled', loading);
                spinner.css('display', loading ? 'inline-block' : 'none');
                submitButton.text(loading ? 'Signing in...' : 'Sign in');
                if (loading) {
                    submitButton.prepend(spinner);
                }
            };

            form.on('submit', function(e) {
                e.preventDefault();
                
                const email = $('#email').val();
                const password = $('#password').val();

                // Reset errors
                $('#emailError').text('');
                $('#passwordError').text('');
                alert.hide();

                // Validate email
                if (!validateEmail(email)) {
                    $('#emailError').text('Please enter a valid email address');
                    return;
                }

                // Show loading state
                showLoading(true);

                login(email, password)
                    .done(function(response) {
                        if (response.success) {
                            // Check user role and redirect accordingly
                            const userInfo = getUserInfo();
                            if (userInfo.role === 'admin') {
                                window.location.href = '/admin.html';
                            } else {
                                window.location.href = '/dashboard.html';
                            }
                        }
                    })
                    .fail(function(error) {
                        showError(error.message || 'An error occurred during login');
                    })
                    .always(function() {
                        showLoading(false);
                    });
            });
        });
    </script>
</body>
</html>
