<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Restaurant</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="dashboard.html">
          <span class="material-icons">arrow_back</span>
        </a>
        <div class="restaurant-title" id="restaurantTitle">Truck</div>
        <div style="width:48px"></div>
      </div>
    </header>

    <main>
      <section class="restaurant-hero">
        <div class="container">
          <div id="restaurantIntro" class="restaurant-intro">
            <!-- Filled by JS -->
          </div>
        </div>
      </section>

      <section class="restaurant-items">
        <div class="container">
          <div id="itemsGrid" class="items-grid">
            <!-- Item cards inserted here -->
          </div>
        </div>
      </section>
    </main>
    <script src="./js/trucks.js"></script>
    <!-- Cart sidebar (same as index) -->
    <aside class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <h2>My Cart</h2>
        <button class="close-cart" id="closeCart">
          <span class="material-icons">close</span>
        </button>
      </div>
      <div class="cart-items">
        <!-- Cart items inserted by main.js -->
      </div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total</span>
          <span class="total-amount">L.E 0.00</span>
        </div>
        <div class="cart-grand-total">
          <span>Grand Total</span>
          <span class="grand-total-amount">L.E 0.00</span>
        </div>
        <div class="cart-estimate">
          <span>Estimated time</span>
          <span class="estimated-time">--</span>
        </div>
        <div class="schedule-pickup" id="schedulePickup">
          <label for="pickupTime">Schedule Pickup:</label>
          <input type="datetime-local" id="pickupTime" class="pickup-input" />
        </div>
        <button class="proceed-btn" id="proceedBtn">Proceed</button>
      </div>
    </aside>

    <script src="./js/main.js" defer></script>

    <script>
      // Read truck query param and render items
      function getQueryParam(name) {
        const url = new URL(window.location.href);
        return url.searchParams.get(name);
      }

      const truckName = getQueryParam('truck') || 'Unknown';
      document.title = truckName + ' — Menu';
      const titleEl = document.getElementById('restaurantTitle');
      if (titleEl) titleEl.textContent = truckName;

      const introEl = document.getElementById('restaurantIntro');
      const itemsGrid = document.getElementById('itemsGrid');

      const data = (window.TRUCKS && window.TRUCKS[truckName]) || [];

      if (introEl) {
        introEl.innerHTML = `\n          <h1>${truckName}</h1>\n          <p>${data.description || 'Delicious items from this truck.'}</p>\n        `;
      }

      function renderItems(items) {
        if (!itemsGrid) return;
        if (items.length === 0) {
          itemsGrid.innerHTML = '<p class="muted">No items found for this truck.</p>';
          return;
        }

        itemsGrid.innerHTML = items.map(item => `
          <div class="item-card">
            <img src="${item.img || './images/images (3).jpeg'}" alt="${item.name}" />
            <div class="item-body">
              <div class="item-name">${item.name}</div>
              <div class="item-desc">${item.desc || ''}</div>
              <div class="item-row">
                <div class="item-price">L.E ${item.price.toFixed(2)}</div>
                <button class="add-btn" data-name="${item.name}" data-price="${item.price}">Add</button>
              </div>
            </div>
          </div>
        `).join('');
      }

      // Show messages based on status
      const status = (window.TRUCKS && window.TRUCKS[truckName] && window.TRUCKS[truckName].status) || 'open';
      if (status === 'busy') {
        if (introEl) introEl.innerHTML = `<h1>${truckName}</h1><p class="muted">The food truck is busy right now.</p>`;
        if (itemsGrid) itemsGrid.innerHTML = '<p class="muted">The food truck is busy and not taking orders right now.</p>';
      } else if (status === 'closed') {
        if (introEl) introEl.innerHTML = `<h1>${truckName}</h1><p class="muted">The food truck is closed.</p>`;
        if (itemsGrid) itemsGrid.innerHTML = '<p class="muted">This food truck is currently closed.</p>';
      } else {
        // Open
        renderItems(data.items || []);

        // Auto-open cart sidebar when visiting an open restaurant
        const cartSidebarEl = document.getElementById('cartSidebar');
        if (cartSidebarEl) cartSidebarEl.classList.add('open');

        // Add button handler: use the shared cart API (window.addToCart). If not available, fallback to alert.
        document.addEventListener('click', function(e){
          const btn = e.target.closest('.add-btn');
          if (!btn) return;
          const name = btn.dataset.name;
          const price = parseFloat(btn.dataset.price);
          if (window.addToCart) {
            // include truck name so cart can enforce single-truck ownership
            const added = window.addToCart({ name, price, quantity: 1, truck: truckName });
            if (added && cartSidebarEl) cartSidebarEl.classList.add('open');
          } else {
            alert(name + ' added to cart (demo)');
          }
        });
      }
    </script>
  </body>
</html>
