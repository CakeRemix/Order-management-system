<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Restaurant</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="dashboard.html">
          <span class="material-icons">arrow_back</span>
        </a>
        <div class="restaurant-title" id="restaurantTitle">Truck</div>
        <div style="width:48px"></div>
      </div>
    </header>

    <main>
      <section class="restaurant-hero">
        <div class="container">
          <div id="restaurantIntro" class="restaurant-intro">
            <!-- Filled by JS -->
          </div>
        </div>
      </section>

      <section class="restaurant-items">
        <div class="container">
          <div id="itemsGrid" class="items-grid">
            <!-- Item cards inserted here -->
          </div>
        </div>
      </section>
    </main>
    <!-- Cart sidebar (same as index) -->
    <aside class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <h2>My Cart</h2>
        <button class="close-cart" id="closeCart">
          <span class="material-icons">close</span>
        </button>
      </div>
      <div class="cart-items">
        <!-- Cart items inserted by main.js -->
      </div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total</span>
          <span class="total-amount">L.E 0.00</span>
        </div>
        <div class="cart-grand-total">
          <span>Grand Total</span>
          <span class="grand-total-amount">L.E 0.00</span>
        </div>
        <div class="cart-estimate">
          <span>Estimated time</span>
          <span class="estimated-time">--</span>
        </div>
        <div class="schedule-pickup" id="schedulePickup">
          <label for="pickupTime">Schedule Pickup:</label>
          <input type="datetime-local" id="pickupTime" class="pickup-input" />
        </div>
        <button class="proceed-btn" id="proceedBtn">Proceed</button>
      </div>
    </aside>

    <script src="./js/auth.js"></script>
    <script src="./js/main.js" defer></script>

    <script>
      // Check authentication first
      $(document).ready(function() {
        checkAuth().then(function(isAuth) {
          if (!isAuth) {
            window.location.href = '/login.html';
            return;
          }

          // Prevent admin from accessing this page
          const userInfo = getUserInfo();
          if (userInfo && userInfo.role === 'admin') {
            window.location.href = '/admin.html';
            return;
          }
          
          // Load menu
          loadTruckMenu();
        });
      });

      // Read truck query param and render items - jQuery way
      function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
      }

      const truckName = getQueryParam('truck') || 'Unknown';
      $(document).prop('title', truckName + ' — Menu');
      const titleEl = $('#restaurantTitle');
      if (titleEl.length) titleEl.text(truckName);

      const introEl = $('#restaurantIntro');
      const itemsGrid = $('#itemsGrid');

      // Load truck and menu data from API using jQuery AJAX
      function loadTruckMenu() {
        $.ajax({
          url: `http://localhost:5000/api/trucks/name/${encodeURIComponent(truckName)}/menu`,
          method: 'GET'
        })
        .done(function(result) {
          if (!result.success) {
            if (introEl.length) introEl.html(`<h1>${truckName}</h1><p class=\"muted\">Food truck not found.</p>`);
            if (itemsGrid.length) itemsGrid.html('<p class=\"muted\">Food truck not found.</p>');
            return;
          }
          
          const truck = result.truck;
          const items = result.data;
          
          // Update title
          if (titleEl.length) titleEl.text(truck.name);
          $(document).prop('title', truck.name + ' — Menu');
          
          // Display intro
          if (introEl.length) {
            introEl.html(`
              <h1>${truck.name}</h1>
              <p>${truck.description || 'Delicious items from this truck.'}</p>
            `);
          }
          
          // Check truck status
          if (truck.is_busy) {
            if (introEl.length) introEl.html(`<h1>${truck.name}</h1><p class=\"muted\">The food truck is busy right now.</p>`);
            if (itemsGrid.length) itemsGrid.html('<p class=\"muted\">The food truck is busy and not taking orders right now.</p>');
            return;
          } else if (truck.status === 'closed') {
            if (introEl.length) introEl.html(`<h1>${truck.name}</h1><p class=\"muted\">The food truck is closed.</p>`);
            if (itemsGrid.length) itemsGrid.html('<p class=\"muted\">This food truck is currently closed.</p>');
            return;
          }
          
          // Render menu items
          renderItems(items, truck.name);
          
          // Cart will open only when items are added
        })
        .fail(function(error) {
          console.error('Error loading menu:', error);
          if (introEl.length) introEl.html(`<h1>${truckName}</h1><p class=\"muted\">Unable to load menu. Please try again later.</p>`);
          if (itemsGrid.length) itemsGrid.html('<p class=\"muted\">Unable to load menu items.</p>');
        });
      }

      function renderItems(items, truckName) {
        if (!itemsGrid.length) return;
        if (items.length === 0) {
          itemsGrid.html('<p class=\"muted\">No items found for this truck.</p>');
          return;
        }

        const itemsHTML = items.map(function(item) {
          return `
            <div class=\"item-card\">
              <img src=\"${item.image_url || './images/images (3).jpeg'}\" alt=\"${item.name}\" />
              <div class=\"item-body\">
                <div class=\"item-name\">${item.name}</div>
                <div class=\"item-desc\">${item.description || ''}</div>
                <div class=\"item-row\">
                  <div class=\"item-price\">L.E ${parseFloat(item.price).toFixed(2)}</div>
                  <button class=\"add-btn\" 
                    data-name=\"${item.name}\" 
                    data-price=\"${item.price}\"
                    data-item-id=\"${item.itemid}\"
                    data-truck-id=\"${item.truckid}\"
                    ${!item.is_available ? 'disabled' : ''}>
                    ${item.is_available ? 'Add' : 'Unavailable'}
                  </button>
                </div>
              </div>
            </div>
          `;
        }).join('');
        
        itemsGrid.html(itemsHTML);
        
        // Add button handler using jQuery: use the shared cart API (window.addToCart)
        $(document).on('click', '.add-btn', function(e) {
          const btn = $(this);
          if (btn.prop('disabled')) return;
          
          const name = btn.data('name');
          const price = parseFloat(btn.data('price'));
          const itemId = parseInt(btn.data('itemId'));
          const truckId = parseInt(btn.data('truckId'));
          
          console.log('Add to cart clicked:', { name, price, itemId, truckId });
          
          if (window.addToCart) {
            // include truck name, itemId, and truckId for backend integration
            const added = window.addToCart({ 
              name, 
              price, 
              quantity: 1, 
              truck: truckName,
              itemId: itemId,
              truckId: truckId
            });
            if (added) {
              $('#cartSidebar').addClass('open');
            }
          } else {
            alert(name + ' added to cart (demo)');
          }
        });
      }
    </script>
  </body>
</html>
