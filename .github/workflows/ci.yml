name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io

jobs:
  # Lint and Format Check
  lint:
    runs-on: ubuntu-latest
    name: Code Quality
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint on backend
      run: npx eslint . --ext .js --max-warnings 0 || true
      continue-on-error: true

  # Backend Tests and Linting
  backend:
    runs-on: ubuntu-latest
    name: Backend Tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: giu_food_truck_db_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # For better diff analysis
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install backend dependencies
      run: npm ci

    - name: Create .env file
      run: |
        cp .env.example .env
        sed -i 's/DB_PASSWORD=your_password_here/DB_PASSWORD=postgres/' .env
        sed -i 's/DB_USER=postgres/DB_USER=postgres/' .env
        sed -i 's/DB_NAME=giu_food_truck_db/DB_NAME=giu_food_truck_db_test/' .env
        sed -i 's/JWT_SECRET=your_super_secret_jwt_key_minimum_32_characters_long/JWT_SECRET=test_secret_key_minimum_32_chars_long/' .env
        sed -i 's/NODE_ENV=development/NODE_ENV=test/' .env

    - name: Wait for PostgreSQL
      run: |
        until pg_isready -h localhost -p 5432 -U postgres; do
          echo 'waiting for postgres...'
          sleep 1
        done

    - name: Run backend tests
      run: npm run test:ci
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: giu_food_truck_db_test
        NODE_ENV: test

    - name: Generate coverage badge
      if: always()
      run: |
        if [ -f coverage/coverage-summary.json ]; then
          cat coverage/coverage-summary.json | jq '.total.lines.pct'
        fi

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/lcov.info
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false
      if: always()

    - name: Upload test results
      uses: actions/upload-artifact@v3
      with:
        name: backend-test-results
        path: test-results/
      if: always()

    - name: Comment PR with test results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          if (fs.existsSync('coverage/coverage-summary.json')) {
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const lines = summary.total.lines.pct;
            const branches = summary.total.branches.pct;
            const comment = `## Backend Test Results
- **Lines Coverage**: ${lines}%
- **Branch Coverage**: ${branches}%`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }

  # Frontend Tests and Build
  frontend:
    runs-on: ubuntu-latest
    name: Frontend Tests & Build
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run frontend tests
      working-directory: ./frontend
      run: npm test -- --watchAll=false --passWithNoTests --coverage --testResultsProcessor=jest-junit
      env:
        CI: true
      continue-on-error: true

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

    - name: Upload frontend coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage
        fail_ci_if_error: false
      if: always()

    - name: Upload frontend build artifact
      uses: actions/upload-artifact@v3
      with:
        name: frontend-build
        path: frontend/build
        retention-days: 7
      if: always()

    - name: Upload test results
      uses: actions/upload-artifact@v3
      with:
        name: frontend-test-results
        path: frontend/junit.xml
      if: always()

  # Security Scan
  security:
    runs-on: ubuntu-latest
    name: Security Checks
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install dependencies
      run: npm ci

    - name: Run backend npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true

    - name: Run frontend npm audit
      working-directory: ./frontend
      run: npm audit --audit-level=moderate
      continue-on-error: true

    - name: Run Snyk security scan (optional)
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: true
      if: secrets.SNYK_TOKEN != ''

  # Database Schema Validation
  database:
    runs-on: ubuntu-latest
    name: Database Validation
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: giu_food_truck_db_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Install psql client
      run: sudo apt-get install -y postgresql-client

    - name: Wait for PostgreSQL
      run: |
        until pg_isready -h localhost -p 5432 -U postgres; do
          echo 'waiting for postgres...'
          sleep 1
        done

    - name: Create test database
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE giu_food_truck_db_test;"

    - name: Apply database schema
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d giu_food_truck_db_test -f database/schema.sql

    - name: Verify schema tables
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d giu_food_truck_db_test -c "\dt"

  # Build Status Check
  build-status:
    runs-on: ubuntu-latest
    needs: [lint, backend, frontend, security, database]
    if: always()
    name: Build Status

    steps:
    - name: Check build status
      run: |
        if [[ "${{ needs.lint.result }}" == "failure" || "${{ needs.backend.result }}" == "failure" || "${{ needs.frontend.result }}" == "failure" ]]; then
          echo "❌ Build failed"
          exit 1
        fi
        echo "✅ Build passed"

  # Docker Build (optional - only on main branch)
  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
    needs: [backend, frontend, security, database]
    name: Docker Build
    
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.backend
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ env.REGISTRY }}/order-management-system:backend-latest
      continue-on-error: true

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ env.REGISTRY }}/order-management-system:frontend-latest
      continue-on-error: true

